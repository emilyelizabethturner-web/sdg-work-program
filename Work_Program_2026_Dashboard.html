<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Active Project Work Program 2026</title>
<style>*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede9;
    --text: #1a1a18;
    --text-secondary: #6b6b67;
    --text-tertiary: #9a9a96;
    --border: rgba(0,0,0,0.12);
    --border-hover: rgba(0,0,0,0.22);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --blue-bg: #e6f1fb; --blue-text: #0c447c;
    --green-bg: #eaf3de; --green-text: #3b6d11;
    --amber-bg: #faeeda; --amber-text: #854f0b;
    --red-bg: #fcebeb; --red-text: #a32d2d;
    --gray-bg: #f1efe8; --gray-text: #5f5e5a;
    --teal-bg: #e1f5ee; --teal-text: #0f6e56;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg-secondary: #252523; --bg-tertiary: #2e2e2b;
      --text: #f0efeb; --text-secondary: #a8a8a4; --text-tertiary: #6b6b67;
      --border: rgba(255,255,255,0.1); --border-hover: rgba(255,255,255,0.2);
      --blue-bg: #0c447c; --blue-text: #b5d4f4;
      --green-bg: #27500a; --green-text: #c0dd97;
      --amber-bg: #633806; --amber-text: #fac775;
      --red-bg: #791f1f; --red-text: #f7c1c1;
      --gray-bg: #444441; --gray-text: #d3d1c7;
      --teal-bg: #085041; --teal-text: #9fe1cb;
    }
  }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg-tertiary); color: var(--text); font-size: 16px; line-height: 1.6; min-height: 100vh; }
  .page { max-width: 900px; margin: 0 auto; padding: 2rem 1rem 4rem; }
  header { margin-bottom: 2rem; }
  header h1 { font-size: 22px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  header p { font-size: 13px; color: var(--text-secondary); }
  .summary-bar { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 1.5rem; }
  .stat { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-md); padding: 12px 14px; text-align: center; }
  .stat-num { font-size: 26px; font-weight: 600; color: var(--text); line-height: 1; }
  .stat-lbl { font-size: 11px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 1rem; align-items: center; }
  .controls input[type=text] { flex: 1; min-width: 180px; padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-size: 13px; outline: none; }
  .controls input[type=text]:focus { border-color: var(--border-hover); }
  .controls select { padding: 8px 12px; border: 0.5px solid var(--border); border-radius: var(--radius-md); background: var(--bg); color: var(--text); font-size: 13px; outline: none; cursor: pointer; }
  .tabs { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
  .tab { padding: 6px 16px; border-radius: 99px; font-size: 12px; cursor: pointer; border: 0.5px solid var(--border); background: var(--bg); color: var(--text-secondary); transition: all 0.15s; user-select: none; }
  .tab:hover { border-color: var(--border-hover); color: var(--text); }
  .tab.active { background: var(--text); color: var(--bg); border-color: var(--text); }
  .grid { display: flex; flex-direction: column; gap: 10px; }
  .card { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; transition: box-shadow 0.15s; }
  .card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
  .card-header { display: flex; align-items: center; gap: 8px; padding: 12px 16px; cursor: pointer; user-select: none; flex-wrap: wrap; }
  .card-header:hover { background: var(--bg-secondary); }
  .proj-num { font-size: 11px; color: var(--text-tertiary); min-width: 42px; font-weight: 500; }
  .proj-name { font-size: 14px; font-weight: 500; color: var(--text); flex: 1; min-width: 160px; }
  .badge { font-size: 11px; padding: 3px 10px; border-radius: 99px; white-space: nowrap; font-weight: 500; }
  .badge-done { background: var(--green-bg); color: var(--green-text); }
  .badge-closed { background: var(--gray-bg); color: var(--gray-text); }
  .badge-heldup { background: var(--red-bg); color: var(--red-text); }
  .badge-progress { background: var(--amber-bg); color: var(--amber-text); }
  .badge-hold { background: var(--gray-bg); color: var(--gray-text); }
  .badge-stuck { background: var(--red-bg); color: var(--red-text); }
  .staff-pill { font-size: 11px; padding: 3px 10px; border-radius: 99px; background: var(--blue-bg); color: var(--blue-text); white-space: nowrap; font-weight: 500; }
  .chevron { font-size: 14px; color: var(--text-tertiary); transition: transform 0.2s; margin-left: auto; flex-shrink: 0; }
  .chevron.open { transform: rotate(90deg); }
  .card-body { display: none; border-top: 0.5px solid var(--border); }
  .card-body.open { display: block; }
  .milestone-row { display: grid; grid-template-columns: 170px 1fr 28px; gap: 10px; align-items: start; padding: 10px 16px; border-bottom: 0.5px solid var(--border); font-size: 13px; }
  .milestone-row:last-child { border-bottom: none; }
  .ms-label { color: var(--text-secondary); font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; padding-top: 2px; }
  .ms-comment { color: var(--text); line-height: 1.55; }
  .ms-comment em { font-style: normal; font-size: 11px; color: var(--text-tertiary); display: block; margin-top: 3px; }
  .ms-status { display: flex; justify-content: center; padding-top: 4px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; }
  .dot-done { background: var(--green-text); }
  .dot-progress { background: #d97706; }
  .dot-hold { background: var(--text-tertiary); }
  .dot-stuck { background: var(--red-text); }
  .card-comment { padding: 10px 16px 14px; font-size: 13px; color: var(--text-secondary); line-height: 1.55; }
  .section-label { font-size: 11px; font-weight: 600; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 0.07em; padding: 1.25rem 0 0.5rem; }
  .no-results { text-align: center; color: var(--text-tertiary); font-size: 14px; padding: 3rem 0; }
  .lodge-body { padding: 14px 16px; }
  .lodge-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .meta-pill { font-size: 11px; padding: 3px 9px; border-radius: 99px; background: var(--teal-bg); color: var(--teal-text); font-weight: 500; }
  .lodge-latest { font-size: 13px; color: var(--text); line-height: 1.55; padding: 10px 12px; background: var(--bg-secondary); border-radius: var(--radius-md); margin-bottom: 12px; border-left: 3px solid var(--amber-text); }
  .lodge-latest strong { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--amber-text); margin-bottom: 4px; }
  .history-toggle { font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 4px 0; border: none; background: none; text-decoration: underline; color: var(--blue-text); }
  .history-list { display: none; margin-top: 10px; border-left: 2px solid var(--border); padding-left: 14px; }
  .history-list.open { display: block; }
  .history-item { margin-bottom: 10px; font-size: 12px; }
  .history-date { color: var(--text-tertiary); font-weight: 600; font-size: 11px; }
  .history-by { color: var(--blue-text); font-weight: 600; font-size: 11px; background: var(--blue-bg); padding: 1px 6px; border-radius: 4px; margin-left: 4px; }
  .history-note { color: var(--text-secondary); line-height: 1.5; margin-top: 2px; }
  @media (max-width: 600px) {
    .summary-bar { grid-template-columns: repeat(2, 1fr); }
    .milestone-row { grid-template-columns: 1fr; }
    .ms-status { justify-content: flex-start; }
  }

  .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.45); z-index:1000; align-items:center; justify-content:center; }
  .modal-overlay.open { display:flex; }
  .modal { background:var(--bg); border-radius:var(--radius-xl); padding:1.5rem; width:min(560px,92vw); max-height:90vh; overflow-y:auto; box-shadow:0 8px 32px rgba(0,0,0,0.18); }
  .modal h3 { font-size:15px; font-weight:600; margin-bottom:1rem; color:var(--text); }
  .modal label { display:block; font-size:11px; font-weight:600; color:var(--text-secondary); text-transform:uppercase; letter-spacing:.04em; margin:10px 0 4px; }
  .modal input, .modal textarea, .modal select { width:100%; padding:8px 10px; border:0.5px solid var(--border); border-radius:var(--radius-md); background:var(--bg-secondary); color:var(--text); font-size:13px; font-family:inherit; outline:none; }
  .modal textarea { min-height:80px; resize:vertical; }
  .modal input:focus, .modal textarea:focus, .modal select:focus { border-color:var(--border-hover); }
  .modal-actions { display:flex; gap:8px; justify-content:flex-end; margin-top:1.25rem; flex-wrap:wrap; }
  .btn { padding:7px 18px; border-radius:var(--radius-md); font-size:13px; cursor:pointer; border:0.5px solid var(--border); background:var(--bg); color:var(--text); font-family:inherit; }
  .btn-primary { background:var(--text); color:var(--bg); border-color:var(--text); }
  .btn-danger { background:var(--red-bg); color:var(--red-text); border-color:var(--red-text); }
  .btn:hover { opacity:.85; }
  .edit-btn { display:inline-flex; align-items:center; justify-content:center; width:22px; height:22px; border-radius:4px; background:transparent; border:none; cursor:pointer; color:var(--text-tertiary); font-size:13px; opacity:0; transition:opacity .15s; margin-left:4px; flex-shrink:0; }
  .card-header:hover .edit-btn, .milestone-row:hover .edit-btn { opacity:1; }
  .edit-btn:hover { color:var(--text); background:var(--bg-tertiary); }
  .add-btn { display:inline-flex; align-items:center; gap:5px; padding:5px 12px; border-radius:99px; font-size:12px; cursor:pointer; border:0.5px dashed var(--border); background:transparent; color:var(--text-secondary); font-family:inherit; margin:8px 0 4px; }
  .add-btn:hover { border-color:var(--border-hover); color:var(--text); }
  .toast { position:fixed; bottom:1.5rem; right:1.5rem; background:var(--text); color:var(--bg); padding:10px 18px; border-radius:var(--radius-md); font-size:13px; z-index:2000; opacity:0; transform:translateY(8px); transition:all .2s; pointer-events:none; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.error { background:var(--red-text); }
  .sync-bar { display:flex; align-items:center; gap:8px; font-size:11px; color:var(--text-tertiary); margin-bottom:.75rem; }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--green-text); flex-shrink:0; }
  .sync-dot.syncing { background:#d97706; animation:pulse .8s infinite; }
  .sync-dot.error { background:var(--red-text); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  .setup-banner { background:var(--amber-bg); border:0.5px solid var(--amber-text); border-radius:var(--radius-md); padding:12px 16px; margin-bottom:1rem; font-size:13px; color:var(--amber-text); }
  .setup-banner strong { display:block; margin-bottom:4px; }
  .setup-banner input { width:100%; margin-top:6px; padding:6px 10px; border:0.5px solid var(--amber-text); border-radius:var(--radius-md); background:var(--bg); color:var(--text); font-size:12px; font-family:monospace; }
</style>
</head><body>
<div class="page">
<header><h1>Active Project Work Program 2026</h1>
<p>Live dashboard — syncs with Google Sheets. Hover any card and click ✎ to edit.</p></header>
<div class="setup-banner" id="setupBanner" style="display:none">
<strong>⚙ Connect to Google Sheets</strong>
Paste your Apps Script Web App URL below to connect live data:
<input type="text" id="sheetUrlInput" placeholder="https://script.google.com/macros/s/...">
<div style="display:flex;gap:8px;margin-top:8px">
<button class="btn btn-primary" onclick="saveSheetUrl()">Connect</button>
<button class="btn" onclick="loadDemoData()">Use offline demo</button>
</div></div>
<div class="sync-bar" id="syncBar"><span class="sync-dot" id="syncDot"></span><span id="syncText">Loading...</span><button class="btn" style="margin-left:auto;padding:4px 12px;font-size:11px" onclick="fetchData()">↻ Refresh</button></div>
<div class="summary-bar" id="summaryBar"><div class="stat"><div class="stat-num">—</div><div class="stat-lbl">In Progress</div></div><div class="stat"><div class="stat-num">—</div><div class="stat-lbl">On Hold</div></div><div class="stat"><div class="stat-num">—</div><div class="stat-lbl">Stuck</div></div><div class="stat"><div class="stat-num">—</div><div class="stat-lbl">Lodgements</div></div></div>
<div class="controls"><input type="text" id="search" placeholder="Search projects, staff, or keywords..."><select id="staffFilter"><option value="">All staff</option></select></div>
<div class="tabs" id="tabs"></div>
<div class="grid" id="grid"></div>
<div id="noResults" class="no-results" style="display:none">No projects match your search.</div>
<div class="vijay-section" id="vijaySection" style="display:none"></div>
<div id="addButtons" style="margin-top:1rem;display:flex;gap:8px;flex-wrap:wrap"></div>
</div>
<div class="modal-overlay" id="modalOverlay"><div class="modal" id="modalBox"><h3 id="modalTitle">Edit</h3><div id="modalBody"></div><div class="modal-actions"><button class="btn btn-danger" id="modalDeleteBtn" style="display:none;margin-right:auto" onclick="handleModalDelete()">Delete</button><button class="btn" onclick="closeModal()">Cancel</button><button class="btn btn-primary" onclick="handleModalSave()">Save</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
let SHEET_URL = localStorage.getItem('sdg_sheet_url') || '';
let DATA = { active:[], onHold:[], standby:[], lodgements:[], staff:[] };
let currentTab = 'active';
let searchVal = '', staffVal = '';
let modalContext = null;

window.addEventListener('DOMContentLoaded', () => {
  if (!SHEET_URL) {
    document.getElementById('setupBanner').style.display = 'block';
    setSyncStatus('error', 'Not connected — enter your Apps Script URL above');
  } else {
    fetchData();
  }
  document.getElementById('search').addEventListener('input', e => { searchVal = e.target.value; render(); });
  document.getElementById('staffFilter').addEventListener('change', e => { staffVal = e.target.value; render(); });
  setInterval(() => { if (SHEET_URL) fetchData(); }, 5 * 60 * 1000);
});

function saveSheetUrl() {
  const url = document.getElementById('sheetUrlInput').value.trim();
  if (!url.startsWith('https://')) return showToast('Please enter a valid URL', true);
  SHEET_URL = url;
  localStorage.setItem('sdg_sheet_url', url);
  document.getElementById('setupBanner').style.display = 'none';
  fetchData();
}

async function fetchData() {
  if (!SHEET_URL) return;
  setSyncStatus('syncing', 'Syncing...');
  try {
    const res = await fetch(SHEET_URL + '?action=getData');
    const json = await res.json();
    if (json.error) throw new Error(json.error);
    DATA = json;
    buildStaffFilter();
    buildTabs();
    updateSummary();
    render();
    setSyncStatus('ok', 'Last synced ' + new Date().toLocaleTimeString());
  } catch(e) {
    setSyncStatus('error', 'Sync failed: ' + e.message);
    showToast('Could not load data from Google Sheets', true);
  }
}

async function apiPost(payload) {
  setSyncStatus('syncing', 'Saving...');
  const res = await fetch(SHEET_URL, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload)
  });
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  await fetchData();
  return json;
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state === 'syncing' ? ' syncing' : state === 'error' ? ' error' : '');
  document.getElementById('syncText').textContent = msg;
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => { t.className = 'toast'; }, 3000);
}

function buildStaffFilter() {
  const sel = document.getElementById('staffFilter');
  const all = new Set();
  [...DATA.active, ...(DATA.onHold||[]), ...(DATA.standby||[])].forEach(p => (p.staff||[]).forEach(s => all.add(s)));
  (DATA.lodgements||[]).forEach(p => (p.staff||[]).forEach(s => all.add(s)));
  const cur = sel.value;
  sel.innerHTML = '<option value="">All staff</option>';
  [...all].sort().forEach(s => { sel.innerHTML += `<option ${s===cur?'selected':''}>${s}</option>`; });
}

function buildTabs() {
  const defs = [{id:'active',label:'Active Projects'},{id:'lodgements',label:'Lodgements'}];
  document.getElementById('tabs').innerHTML = defs.map(t =>
    `<div class="tab ${t.id===currentTab?'active':''}" onclick="switchTab('${t.id}')">${t.label}</div>`
  ).join('');
}

function switchTab(t) { currentTab = t; buildTabs(); render(); }

function updateSummary() {
  const prog  = DATA.active.filter(p => p.overall==='progress').length;
  const hold  = DATA.active.filter(p => p.overall==='hold').length + (DATA.onHold||[]).length;
  const stuck = DATA.active.filter(p => p.overall==='stuck').length;
  document.getElementById('summaryBar').innerHTML = `
    <div class="stat"><div class="stat-num">${prog}</div><div class="stat-lbl">In Progress</div></div>
    <div class="stat"><div class="stat-num">${hold}</div><div class="stat-lbl">On Hold</div></div>
    <div class="stat"><div class="stat-num">${stuck}</div><div class="stat-lbl">Stuck</div></div>
    <div class="stat"><div class="stat-num">${(DATA.lodgements||[]).length}</div><div class="stat-lbl">Lodgements</div></div>`;
}

function statusBadge(s) {
  const map = {progress:'badge-progress',hold:'badge-hold',stuck:'badge-stuck',done:'badge-done',closed:'badge-closed',heldup:'badge-heldup'};
  const labels = {progress:'In Progress',hold:'Hold',stuck:'Stuck',done:'Done',closed:'Closed',heldup:'Held Up'};
  return `<span class="badge ${map[s]||'badge-hold'}">${labels[s]||s}</span>`;
}

function dotClass(s) {
  return {progress:'dot-progress',hold:'dot-hold',stuck:'dot-stuck',done:'dot-done'}[s]||'dot-hold';
}

function matches(p) {
  const q = searchVal.toLowerCase();
  const nm = !q || p.name.toLowerCase().includes(q) || (p.id||'').toLowerCase().includes(q)
    || (p.phase||'').toLowerCase().includes(q)
    || (p.staff||[]).some(s => s.toLowerCase().includes(q))
    || (p.milestones||[]).some(m => (m.comment||'').toLowerCase().includes(q) || (m.label||'').toLowerCase().includes(q))
    || (p.comment||'').toLowerCase().includes(q)
    || (p.latestUpdate||'').toLowerCase().includes(q);
  const sm = !staffVal || (p.staff||[]).includes(staffVal);
  return nm && sm;
}

function render() {
  const grid = document.getElementById('grid');
  const addBtns = document.getElementById('addButtons');
  if (currentTab === 'active') {
    grid.innerHTML = renderActive();
    addBtns.innerHTML = `
      <button class="add-btn" onclick="openAddProject()">＋ Add Project</button>
      <button class="add-btn" onclick="openAddOnHold()">＋ Add On-Hold Project</button>`;
    renderVijaySection();
  } else {
    grid.innerHTML = renderLodgements();
    addBtns.innerHTML = `<button class="add-btn" onclick="openAddLodgement()">＋ Add Lodgement</button>`;
    document.getElementById('vijaySection').style.display = 'none';
  }
  document.getElementById('noResults').style.display = grid.innerHTML.trim() ? 'none' : 'block';
}

function renderActive() {
  let html = '';
  DATA.active.filter(matches).forEach(p => { html += projectCard(p); });
  const holdFiltered = (DATA.onHold||[]).filter(matches);
  if (holdFiltered.length) {
    html += '<div class="section-label">On Hold – No Feedback</div>';
    holdFiltered.forEach(p => { html += simpleCard(p, 'hold', 'onHold'); });
  }
  if (!searchVal && !staffVal) {
    html += '<div class="section-label">Standby – Attendance As / When Required</div>';
    (DATA.standby||[]).forEach(p => { html += simpleCard(p, '', 'standby'); });
  }
  return html;
}

function projectCard(p) {
  const msHtml = (p.milestones||[]).map(ms => `
    <div class="milestone-row">
      <div class="ms-label">${ms.label}</div>
      <div class="ms-comment">${ms.comment||''}${ms.staff ? `<em>Staff: ${ms.staff}</em>` : ''}${ms.date ? `<em>${ms.date}</em>` : ''}</div>
      <div class="ms-status" style="display:flex;align-items:center;gap:4px">
        <span class="dot ${dotClass(ms.status)}"></span>
        <button class="edit-btn" title="Edit milestone" onclick="openEditMilestone(event,'${p.id}','${esc(ms.label)}')">✎</button>
      </div>
    </div>`).join('');
  return `<div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <span class="proj-num">${p.id}</span>
      <span class="proj-name">${p.name}</span>
      ${(p.staff||[]).map(s => `<span class="staff-pill">${s}</span>`).join('')}
      ${statusBadge(p.overall)}
      <button class="edit-btn" title="Edit project" onclick="openEditProject(event,'${p.id}')">✎</button>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">
      ${msHtml}
      <div style="padding:8px 16px">
        <button class="add-btn" onclick="openAddMilestone(event,'${p.id}')">＋ Add milestone</button>
      </div>
    </div>
  </div>`;
}

function simpleCard(p, badge, section) {
  return `<div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <span class="proj-num">${p.id}</span>
      <span class="proj-name">${p.name}</span>
      ${(p.staff||[]).map(s => `<span class="staff-pill">${s}</span>`).join('')}
      ${badge ? statusBadge(badge) : ''}
      <button class="edit-btn" title="Edit" onclick="openEditSimple(event,'${p.id}','${section}')">✎</button>
      <span class="chevron">›</span>
    </div>
    <div class="card-body"><div class="card-comment">${p.comment||''}</div></div>
  </div>`;
}

function renderLodgements() {

function renderVijaySection() {
  const sec = document.getElementById('vijaySection');
  if (searchVal || staffVal || currentTab !== 'active') { sec.style.display='none'; return; }
  const items = [];
  DATA.active.forEach(p => {
    (p.milestones||[]).forEach(ms => {
      const txt = (ms.comment||'').toLowerCase();
      if (txt.includes('vs for') || txt.includes('vijay') ||
         (txt.includes('no feedback') && txt.includes('vs')) ||
          txt.includes('sent to vs') || txt.includes('given to vijay') ||
          txt.includes('waiting for vs')) {
        items.push({proj: p, ms});
      }
    });
  });
  if (!items.length) { sec.style.display='none'; return; }
  sec.style.display = 'block';
  sec.innerHTML = `
    <div class="vijay-header">
      <h2>⚑ Vijay Sharma — Items Requiring Attention</h2>
      <span>${items.length} items awaiting VS review, feedback, or decision</span>
    </div>` +
    items.map(({proj, ms}) => `
    <div class="card">
      <div class="card-header" onclick="toggleCard(this)">
        <span class="proj-num">${proj.id}</span>
        <span class="proj-name">${proj.name}</span>
        <span class="vijay-badge">${ms.label}</span>
        <span class="chevron">›</span>
      </div>
      <div class="card-body">
        <div class="vijay-action-row">
          <div class="vijay-proj-ref">${ms.label}</div>
          <div class="ms-comment">${ms.comment||''}${ms.staff ? `<em>Staff awaiting: ${ms.staff}</em>` : ''}</div>
          <div class="ms-status"><span class="dot ${dotClass(ms.status)}"></span></div>
        </div>
      </div>
    </div>`).join('');
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.chevron');
  body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function toggleHistory(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open') ? 'Hide follow-up history'
    : `Show full follow-up history (${el.querySelectorAll('.history-item').length} entries)`;
}

function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ── Modal system ───────────────────────────────────────────────
function openModal(title, bodyHtml, context, showDelete) {
  modalContext = context;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalDeleteBtn').style.display = showDelete ? 'inline-block' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalContext = null;
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function statusOptions(current) {
  return ['progress','done','hold','stuck','closed','heldup'].map(s =>
    `<option ${s===current?'selected':''}>${s}</option>`).join('');
}

function msStatusOptions(current) {
  return ['progress','done','hold','stuck'].map(s =>
    `<option ${s===current?'selected':''}>${s}</option>`).join('');
}

// ── Save ───────────────────────────────────────────────────────
async function handleModalSave() {
  const ctx = modalContext;
  if (!ctx) return;
  const val = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  try {
    if (ctx.type === 'milestone') {
      await apiPost({ action:'updateMilestone', projectId:ctx.projectId, label:ctx.originalLabel,
        comment:val('m_comment'), staff:val('m_staff'), status:val('m_status'), date:val('m_date') });
      showToast('Milestone updated ✓');
    } else if (ctx.type === 'addMilestone') {
      await apiPost({ action:'addMilestone', projectId:ctx.projectId, label:val('m_label'),
        comment:val('m_comment'), staff:val('m_staff'), status:val('m_status'), date:val('m_date') });
      showToast('Milestone added ✓');
    } else if (ctx.type === 'project') {
      await apiPost({ action:'updateProject', id:val('p_id'), name:val('p_name'), phase:val('p_phase'),
        staff:val('p_staff').split(',').map(s=>s.trim()).filter(Boolean), overall:val('p_overall') });
      showToast('Project updated ✓');
    } else if (ctx.type === 'addProject') {
      await apiPost({ action:'addProject', id:val('p_id'), name:val('p_name'), phase:val('p_phase'),
        staff:val('p_staff').split(',').map(s=>s.trim()).filter(Boolean),
        overall:val('p_overall'), firstMilestone:val('p_firstMilestone') });
      showToast('Project added ✓');
    } else if (ctx.type === 'simple' || ctx.type === 'addSimple') {
      await apiPost({ action:'updateOnHold', section:ctx.section,
        id:val('s_id'), name:val('s_name'),
        staff:val('s_staff').split(',').map(s=>s.trim()).filter(Boolean),
        comment:val('s_comment') });
      showToast('Updated ✓');
    } else if (ctx.type === 'lodgement') {
      const histNote = val('l_histNote');
      const payload = { action:'updateLodgement', id:val('l_id'), name:val('l_name'),
        staff:val('l_staff').split(',').map(s=>s.trim()).filter(Boolean),
        authority:val('l_authority'), refNo:val('l_refNo'),
        status:val('l_status'), latestUpdate:val('l_update') };
      if (histNote) { payload.histDate = val('l_histDate'); payload.histBy = val('l_histBy'); payload.histNote = histNote; }
      await apiPost(payload);
      showToast('Lodgement updated ✓');
    } else if (ctx.type === 'addLodgement') {
      await apiPost({ action:'addLodgement', id:val('l_id'), name:val('l_name'),
        staff:val('l_staff').split(',').map(s=>s.trim()).filter(Boolean),
        authority:val('l_authority'), refNo:val('l_refNo'),
        status:val('l_status'), latestUpdate:val('l_update') });
      showToast('Lodgement added ✓');
    }
    closeModal();
  } catch(e) {
    showToast('Save failed: ' + e.message, true);
  }
}

async function handleModalDelete() {
  if (!modalContext || !confirm('Delete this item? This cannot be undone.')) return;
  const ctx = modalContext;
  try {
    if (ctx.type === 'project') {
      await apiPost({ action:'deleteProject', id:ctx.projectId });
      showToast('Project deleted');
      closeModal();
    } else {
      showToast('To delete on-hold or lodgement items, remove the row directly in Google Sheets.', true);
    }
  } catch(e) {
    showToast('Delete failed: ' + e.message, true);
  }
}
