<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Active Project Work Program 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#f7f6f3; --surface:#fff; --surface2:#fff7ed; --border:#e8e0d8;
  --text:#16151f; --text2:#6e6d7a; --text3:#a8a7b3;
  --accent:#c2410c; --accent2:#ea580c; --accent-light:#fff7ed;
  --ok:#065f46; --ok-light:#ecfdf5;
  --danger:#be123c; --danger-light:#fff1f2;
  --warn:#92400e; --warn-light:#fffbeb;
  --info:#0369a1; --info-light:#f0f9ff;
  --teal:#0f766e; --teal-light:#f0fdfa;
  --blue-light:#eff6ff; --blue-text:#1d4ed8;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 16px rgba(0,0,0,.05);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
  --radius:10px; --radius-lg:14px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px;-webkit-font-smoothing:antialiased;}

/* ── HEADER ── */
.header{background:var(--accent);color:#fff;padding:0 32px;display:flex;align-items:center;justify-content:space-between;height:62px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(194,65,12,.35);}
.header-left{}
.header-logo{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;letter-spacing:-.3px;}
.header-sub{font-size:10px;opacity:.6;letter-spacing:1.5px;text-transform:uppercase;margin-top:1px;}
.header-right{display:flex;align-items:center;gap:10px;}
.hbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;padding:6px 16px;border-radius:6px;cursor:pointer;font-size:12px;font-family:inherit;font-weight:500;transition:background .15s;}
.hbtn:hover{background:rgba(255,255,255,.28);}
.sync-pill{display:flex;align-items:center;gap:6px;font-size:11px;opacity:.8;}
.sync-dot{width:7px;height:7px;border-radius:50%;background:#4ade80;flex-shrink:0;}
.sync-dot.syncing{background:#fbbf24;animation:pulse .8s infinite;}
.sync-dot.error{background:#f87171;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
.main{padding:24px 32px 48px;max-width:1600px;margin:0 auto;}

/* ── SUMMARY STATS ── */
.stats-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;box-shadow:var(--shadow);}
.stat-card.accent{background:var(--accent);border-color:var(--accent);}
.stat-card.accent .stat-label{color:rgba(255,255,255,.65);}
.stat-card.accent .stat-value{color:#fff;}
.stat-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--text2);margin-bottom:6px;}
.stat-value{font-size:30px;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums;line-height:1;}
.stat-sub{font-size:11px;color:var(--text2);margin-top:4px;}

/* ── CONTROLS ── */
.controls-row{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search-wrap{flex:1;min-width:220px;position:relative;}
.search-wrap input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--text);outline:none;transition:border .15s;}
.search-wrap input:focus{border-color:var(--accent2);}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none;}
.ctrl-select{padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;background:var(--surface);color:var(--text);outline:none;cursor:pointer;}
.ctrl-select:focus{border-color:var(--accent2);}

/* ── TABS ── */
.tabs{display:flex;gap:6px;margin-bottom:20px;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:5px;width:fit-content;box-shadow:var(--shadow);}
.tab{padding:7px 20px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);transition:all .15s;white-space:nowrap;border:none;background:none;font-family:inherit;}
.tab:hover{color:var(--text);}
.tab.active{background:var(--accent);color:#fff;box-shadow:0 2px 8px rgba(194,65,12,.3);}

/* ── CONTENT GRID ── */
.content-grid{display:grid;grid-template-columns:1fr 380px;gap:20px;align-items:start;}
.content-main{}
.content-side{}

/* ── SECTION LABELS ── */
.section-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.9px;color:var(--text2);padding:18px 0 8px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}
.section-label.orange{color:var(--accent);}
.section-label.red{color:var(--danger);}
.section-label.gray{color:var(--text3);}
.section-label.blue{color:var(--info);}

/* ── PROJECT CARDS ── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);margin-bottom:8px;transition:box-shadow .15s;}
.card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1);}
.card-header{display:flex;align-items:center;gap:10px;padding:13px 16px;cursor:pointer;user-select:none;flex-wrap:wrap;}
.card-header:hover{background:var(--surface2);}
.proj-num{font-size:11px;color:var(--text3);min-width:48px;font-weight:600;font-family:'Syne',sans-serif;}
.proj-name{font-size:14px;font-weight:600;color:var(--text);flex:1;min-width:140px;}
.phase-tag{font-size:10px;color:var(--text2);background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:2px 7px;white-space:nowrap;}
.staff-pill{font-size:11px;padding:3px 10px;border-radius:99px;background:var(--info-light);color:var(--info);white-space:nowrap;font-weight:500;border:1px solid #bfdbfe;}
.badge{font-size:10px;padding:3px 10px;border-radius:99px;white-space:nowrap;font-weight:600;letter-spacing:.2px;}
.badge-progress{background:var(--warn-light);color:var(--warn);}
.badge-done{background:var(--ok-light);color:var(--ok);}
.badge-hold{background:#f1efe8;color:#6b6b62;}
.badge-stuck{background:var(--danger-light);color:var(--danger);}
.badge-heldup{background:#fff1f2;color:#9f1239;}
.badge-closed{background:#f1efe8;color:#6b6b62;}
.badge-standby{background:var(--bg);color:var(--text2);}
.badge-lodgement{background:var(--info-light);color:var(--info);}
.chevron{font-size:14px;color:var(--text3);transition:transform .2s;margin-left:auto;flex-shrink:0;}
.chevron.open{transform:rotate(90deg);}
.card-body{display:none;border-top:1px solid var(--border);}
.card-body.open{display:block;}

/* ── MILESTONES ── */
.milestone-row{display:grid;grid-template-columns:160px 1fr auto;gap:12px;align-items:start;padding:11px 16px;border-bottom:1px solid var(--border);font-size:13px;}
.milestone-row:last-child{border-bottom:none;}
.ms-label{color:var(--text2);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding-top:2px;line-height:1.4;}
.ms-comment{color:var(--text);line-height:1.55;}
.ms-comment em{font-style:normal;font-size:11px;color:var(--text3);display:block;margin-top:3px;}
.ms-status{display:flex;align-items:center;gap:6px;padding-top:3px;}
.dot{width:9px;height:9px;border-radius:50%;display:inline-block;flex-shrink:0;}
.dot-done{background:var(--ok);}
.dot-progress{background:#d97706;}
.dot-hold{background:var(--text3);}
.dot-stuck{background:var(--danger);}
.card-comment{padding:12px 16px;font-size:13px;color:var(--text2);line-height:1.6;}
.add-ms-wrap{padding:8px 16px 12px;}

/* ── LODGEMENTS ── */
.lodge-body{padding:14px 16px;}
.lodge-meta{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.meta-pill{font-size:11px;padding:3px 9px;border-radius:99px;background:var(--teal-light);color:var(--teal);font-weight:500;border:1px solid #99f6e4;}
.lodge-latest{font-size:13px;color:var(--text);line-height:1.55;padding:10px 13px;background:var(--warn-light);border-radius:8px;margin-bottom:12px;border-left:3px solid var(--warn);}
.lodge-latest strong{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.06em;color:var(--warn);margin-bottom:4px;font-weight:700;}
.history-toggle{font-size:12px;color:var(--info);cursor:pointer;border:none;background:none;font-family:inherit;text-decoration:underline;}
.history-list{display:none;margin-top:10px;border-left:2px solid var(--border);padding-left:14px;}
.history-list.open{display:block;}
.history-item{margin-bottom:10px;font-size:12px;}
.history-date{color:var(--text3);font-weight:600;font-size:11px;}
.history-by{color:var(--info);font-weight:600;font-size:11px;background:var(--info-light);padding:1px 6px;border-radius:4px;margin-left:4px;}
.history-note{color:var(--text2);line-height:1.5;margin-top:2px;}

/* ── VIJAY SECTION (SIDEBAR) ── */
.vijay-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow);position:sticky;top:82px;}
.vijay-panel-header{background:var(--info);color:#fff;padding:14px 18px;}
.vijay-panel-header h2{font-family:'Syne',sans-serif;font-size:14px;font-weight:700;margin-bottom:2px;}
.vijay-panel-header p{font-size:11px;opacity:.75;}
.vijay-badge-count{display:inline-block;background:rgba(255,255,255,.25);border-radius:99px;padding:2px 8px;font-size:11px;font-weight:700;margin-left:6px;}
.vijay-item{padding:12px 16px;border-bottom:1px solid var(--border);}
.vijay-item:last-child{border-bottom:none;}
.vijay-proj{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.vijay-proj-ref{font-size:10px;font-weight:700;color:var(--accent);background:var(--accent-light);border-radius:4px;padding:2px 6px;}
.vijay-proj-name{font-size:12px;font-weight:600;color:var(--text);}
.vijay-milestone{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--text2);margin-bottom:4px;}
.vijay-comment{font-size:12px;color:var(--text2);line-height:1.5;}
.vijay-staff{font-size:11px;color:var(--info);margin-top:4px;}
.vijay-empty{padding:24px 16px;text-align:center;color:var(--text3);font-size:12px;}
.vijay-dot{width:8px;height:8px;border-radius:50%;background:#d97706;flex-shrink:0;}

/* ── BUTTONS ── */
.btn{padding:7px 18px;border-radius:6px;font-size:13px;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-weight:500;transition:all .15s;}
.btn:hover{background:var(--surface2);}
.btn-primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.btn-primary:hover{background:var(--accent2);}
.btn-danger{background:var(--danger-light);color:var(--danger);border-color:#fca5a5;}
.btn-danger:hover{background:#fee2e2;}
.add-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:99px;font-size:12px;cursor:pointer;border:1px dashed var(--border);background:transparent;color:var(--text2);font-family:inherit;transition:all .15s;}
.add-btn:hover{border-color:var(--accent2);color:var(--accent2);}
.edit-btn{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:4px;background:transparent;border:none;cursor:pointer;color:var(--text3);font-size:13px;opacity:0;transition:opacity .15s;flex-shrink:0;}
.card-header:hover .edit-btn,.milestone-row:hover .edit-btn{opacity:1;}
.edit-btn:hover{color:var(--text);background:var(--bg);}
.add-buttons-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}

/* ── MODAL ── */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--surface);border-radius:14px;padding:24px;width:min(560px,92vw);max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-lg);}
.modal h3{font-size:15px;font-weight:600;margin-bottom:16px;font-family:'Syne',sans-serif;}
.modal label{display:block;font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 4px;}
.modal input,.modal textarea,.modal select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:6px;background:var(--bg);color:var(--text);font-size:13px;font-family:inherit;outline:none;transition:border .15s;}
.modal textarea{min-height:80px;resize:vertical;}
.modal input:focus,.modal textarea:focus,.modal select:focus{border-color:var(--accent2);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap;}

/* ── TOAST ── */
.toast{position:fixed;bottom:24px;right:24px;background:var(--text);color:#fff;padding:11px 20px;border-radius:8px;font-size:13px;font-weight:500;z-index:2000;opacity:0;transform:translateY(8px);transition:all .25s;pointer-events:none;}
.toast.show{opacity:1;transform:none;}
.toast.error{background:var(--danger);}
.toast.success{background:var(--ok);}

/* ── NO RESULTS ── */
.no-results{text-align:center;color:var(--text3);font-size:14px;padding:48px 0;}

/* ── RESPONSIVE ── */
@media(max-width:1100px){
  .content-grid{grid-template-columns:1fr;}
  .vijay-panel{position:static;}
  .stats-grid{grid-template-columns:repeat(3,1fr);}
}
@media(max-width:600px){
  .main{padding:16px;}
  .stats-grid{grid-template-columns:repeat(2,1fr);}
  .milestone-row{grid-template-columns:1fr;}
  .ms-status{justify-content:flex-start;}
  .header{padding:0 16px;}
}
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="header-logo">Sharma Design Group</div>
    <div class="header-sub">Active Project Work Program 2026</div>
  </div>
  <div class="header-right">
    <div class="sync-pill"><span class="sync-dot" id="syncDot"></span><span id="syncText">Loading…</span></div>
    <button class="hbtn" onclick="fetchData()">↻ Refresh</button>
  </div>
</div>

<div class="main">

  <!-- Stats -->
  <div class="stats-grid" id="summaryBar">
    <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">Held Up</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">On Hold</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">No Progress</div><div class="stat-value">—</div></div>
    <div class="stat-card"><div class="stat-label">Lodgements</div><div class="stat-value">—</div></div>
  </div>

  <!-- Controls -->
  <div class="controls-row">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search projects, staff, notes…">
    </div>
    <select class="ctrl-select" id="staffFilter"><option value="">All staff</option></select>
  </div>

  <!-- Tabs -->
  <div class="tabs" id="tabs"></div>

  <!-- Two-column layout: main content + Vijay sidebar -->
  <div class="content-grid">
    <div class="content-main">
      <div id="grid"></div>
      <div id="noResults" class="no-results" style="display:none">No projects match your search.</div>
      <div class="add-buttons-row" id="addButtons"></div>
    </div>
    <div class="content-side">
      <div class="vijay-panel" id="vijayPanel" style="display:none">
        <div class="vijay-panel-header">
          <h2>⚑ Vijay Sharma <span class="vijay-badge-count" id="vijayCount">0</span></h2>
          <p>Items requiring attention or decision</p>
        </div>
        <div id="vijayList"></div>
      </div>
    </div>
  </div>

</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <h3 id="modalTitle">Edit</h3>
    <div id="modalBody"></div>
    <div class="modal-actions">
      <button class="btn btn-danger" id="modalDeleteBtn" style="display:none;margin-right:auto" onclick="handleModalDelete()">Delete</button>
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="handleModalSave()">Save</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let SHEET_URL = 'https://script.google.com/macros/s/AKfycbx34N6ognL3vXGlHrpoKas0syU7S0Dy2orU9ba0RxsuaLCIMfsJKdrwLyjlPUD00vqR/exec';
let DATA = { active:[], onHold:[], standby:[], lodgements:[], staff:[] };
let currentTab = 'active';
let searchVal = '', staffVal = '';
let modalContext = null;

window.addEventListener('DOMContentLoaded', () => {
  fetchData();
  document.getElementById('search').addEventListener('input', e => { searchVal = e.target.value; render(); });
  document.getElementById('staffFilter').addEventListener('change', e => { staffVal = e.target.value; render(); });
  setInterval(() => { if (SHEET_URL) fetchData(); }, 5 * 60 * 1000);
});

function fetchData() {
  if (!SHEET_URL) return;
  setSyncStatus('syncing', 'Syncing…');
  return new Promise((resolve, reject) => {
    const cb = 'sdg_cb_' + Date.now();
    const script = document.createElement('script');
    window[cb] = function(json) {
      delete window[cb];
      document.body.removeChild(script);
      if (json.error) { setSyncStatus('error', 'Error: ' + json.error); reject(json.error); return; }
      DATA = json;
      buildStaffFilter();
      buildTabs();
      updateSummary();
      render();
      setSyncStatus('ok', 'Updated ' + new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}));
      resolve();
    };
    script.onerror = function() {
      delete window[cb];
      document.body.removeChild(script);
      setSyncStatus('error', 'Sync failed');
      reject('Script load error');
    };
    script.src = SHEET_URL + '?action=getData&callback=' + cb;
    document.body.appendChild(script);
  });
}

async function apiPost(payload) {
  setSyncStatus('syncing', 'Saving…');
  return new Promise((resolve, reject) => {
    const cb = 'sdg_post_' + Date.now();
    const script = document.createElement('script');
    window[cb] = function(json) {
      delete window[cb];
      document.body.removeChild(script);
      if (json.error) { reject(new Error(json.error)); return; }
      fetchData().then(() => resolve(json)).catch(reject);
    };
    script.onerror = function() {
      delete window[cb];
      document.body.removeChild(script);
      reject(new Error('Request failed'));
    };
    script.src = SHEET_URL + '?callback=' + cb + '&payload=' + encodeURIComponent(JSON.stringify(payload));
    document.body.appendChild(script);
  });
}

function setSyncStatus(state, msg) {
  const dot = document.getElementById('syncDot');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  document.getElementById('syncText').textContent = msg;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => { t.className = 'toast'; }, 3000);
}

function buildStaffFilter() {
  const sel = document.getElementById('staffFilter');
  const all = new Set();
  [...DATA.active,...(DATA.onHold||[]),...(DATA.standby||[])].forEach(p => (p.staff||[]).forEach(s => all.add(s)));
  (DATA.lodgements||[]).forEach(p => (p.staff||[]).forEach(s => all.add(s)));
  const cur = sel.value;
  sel.innerHTML = '<option value="">All staff</option>';
  [...all].sort().forEach(s => { sel.innerHTML += `<option${s===cur?' selected':''}>${s}</option>`; });
}

function buildTabs() {
  const defs = [{id:'active',label:'Active Projects'},{id:'lodgements',label:'Lodgements'}];
  document.getElementById('tabs').innerHTML = defs.map(t =>
    `<button class="tab${t.id===currentTab?' active':''}" onclick="switchTab('${t.id}')">${t.label}</button>`
  ).join('');
}

function switchTab(t) { currentTab = t; buildTabs(); render(); }

function updateSummary() {
  const prog  = DATA.active.filter(p => p.overall==='progress').length;
  const held  = DATA.active.filter(p => p.overall==='heldup').length;
  const hold  = DATA.active.filter(p => p.overall==='hold').length + (DATA.onHold||[]).length;
  const stuck = DATA.active.filter(p => p.overall==='stuck').length;
  const lodge = (DATA.lodgements||[]).length;
  document.getElementById('summaryBar').innerHTML = `
    <div class="stat-card"><div class="stat-label">In Progress</div><div class="stat-value" style="color:var(--accent)">${prog}</div><div class="stat-sub">active projects</div></div>
    <div class="stat-card"><div class="stat-label">Held Up</div><div class="stat-value" style="color:var(--danger)">${held}</div><div class="stat-sub">awaiting decision</div></div>
    <div class="stat-card"><div class="stat-label">On Hold</div><div class="stat-value" style="color:var(--text2)">${hold}</div><div class="stat-sub">no feedback</div></div>
    <div class="stat-card"><div class="stat-label">No Progress</div><div class="stat-value" style="color:var(--warn)">${stuck}</div><div class="stat-sub">stalled</div></div>
    <div class="stat-card"><div class="stat-label">Lodgements</div><div class="stat-value" style="color:var(--info)">${lodge}</div><div class="stat-sub">with authorities</div></div>
  `;
}

function statusBadge(s) {
  const map = {progress:'badge-progress',hold:'badge-hold',stuck:'badge-stuck',done:'badge-done',closed:'badge-closed',heldup:'badge-heldup',standby:'badge-standby',lodgement:'badge-lodgement'};
  const labels = {progress:'In Progress',hold:'On Hold',stuck:'No Progress',done:'Done',closed:'Closed',heldup:'Held Up',standby:'Standby',lodgement:'Lodgement'};
  return `<span class="badge ${map[s]||'badge-hold'}">${labels[s]||s}</span>`;
}

function dotClass(s) {
  return {progress:'dot-progress',hold:'dot-hold',stuck:'dot-stuck',done:'dot-done'}[s]||'dot-hold';
}

function matches(p) {
  const q = searchVal.toLowerCase();
  const nm = !q || (p.name||'').toLowerCase().includes(q) || (p.id||'').toLowerCase().includes(q)
    || (p.phase||'').toLowerCase().includes(q)
    || (p.staff||[]).some(s => s.toLowerCase().includes(q))
    || (p.milestones||[]).some(m => (m.comment||'').toLowerCase().includes(q) || (m.label||'').toLowerCase().includes(q))
    || (p.comment||'').toLowerCase().includes(q)
    || (p.latestUpdate||'').toLowerCase().includes(q);
  const sm = !staffVal || (p.staff||[]).includes(staffVal);
  return nm && sm;
}

function sortByJobNum(arr) {
  return arr.slice().sort((a,b) => {
    const pa = (a.id||'').replace(/[^0-9]/g,'');
    const pb = (b.id||'').replace(/[^0-9]/g,'');
    return parseInt(pa||0) - parseInt(pb||0);
  });
}

function render() {
  const grid = document.getElementById('grid');
  const addBtns = document.getElementById('addButtons');
  if (currentTab === 'active') {
    grid.innerHTML = renderActive();
    addBtns.innerHTML = `
      <button class="add-btn" onclick="openAddProject()">＋ Add Project</button>
      <button class="add-btn" onclick="openAddOnHold()">＋ Add On-Hold Project</button>`;
    renderVijayPanel();
  } else {
    grid.innerHTML = renderLodgements();
    addBtns.innerHTML = `<button class="add-btn" onclick="openAddLodgement()">＋ Add Lodgement</button>`;
    document.getElementById('vijayPanel').style.display = 'none';
  }
  document.getElementById('noResults').style.display = grid.innerHTML.trim() ? 'none' : 'block';
}

function renderActive() {
  let html = '';

  const inProgress = sortByJobNum(DATA.active.filter(p => p.overall==='progress').filter(matches));
  if (inProgress.length) {
    html += '<div class="section-label orange">In Progress</div>';
    inProgress.forEach(p => { html += projectCard(p); });
  }

  const heldUp = sortByJobNum(DATA.active.filter(p => p.overall==='heldup').filter(matches));
  if (heldUp.length) {
    html += '<div class="section-label red">Held Up</div>';
    heldUp.forEach(p => { html += projectCard(p); });
  }

  const onHoldActive = sortByJobNum(DATA.active.filter(p => p.overall==='hold').filter(matches));
  const holdFiltered = sortByJobNum((DATA.onHold||[]).filter(matches));
  if (onHoldActive.length || holdFiltered.length) {
    html += '<div class="section-label gray">On Hold – No Feedback</div>';
    onHoldActive.forEach(p => { html += projectCard(p); });
    holdFiltered.forEach(p => { html += simpleCard(p, 'hold', 'onHold'); });
  }

  const noProgress = sortByJobNum(DATA.active.filter(p => p.overall==='stuck').filter(matches));
  if (noProgress.length) {
    html += '<div class="section-label red">No Progress</div>';
    noProgress.forEach(p => { html += projectCard(p); });
  }

  if (!searchVal && !staffVal) {
    html += '<div class="section-label gray">Standby – Attendance As / When Required</div>';
    (DATA.standby||[]).forEach(p => { html += simpleCard(p, '', 'standby'); });
  }

  return html;
}

function projectCard(p) {
  const msHtml = (p.milestones||[]).map(ms => `
    <div class="milestone-row">
      <div class="ms-label">${ms.label}</div>
      <div class="ms-comment">${ms.comment||''}
        ${ms.staff ? `<em>👤 ${ms.staff}</em>` : ''}
        ${ms.date ? `<em>📅 ${ms.date}</em>` : ''}
      </div>
      <div class="ms-status">
        <span class="dot ${dotClass(ms.status)}"></span>
        <button class="edit-btn" title="Edit milestone" onclick="openEditMilestone(event,'${p.id}','${esc(ms.label)}')">✎</button>
      </div>
    </div>`).join('');

  const phase = p.phase ? `<span class="phase-tag">${p.phase}</span>` : '';

  return `<div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <span class="proj-num">${p.id}</span>
      <span class="proj-name">${p.name}</span>
      ${phase}
      ${(p.staff||[]).map(s=>`<span class="staff-pill">${s}</span>`).join('')}
      ${statusBadge(p.overall)}
      <button class="edit-btn" title="Edit project" onclick="openEditProject(event,'${p.id}')">✎</button>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">
      ${msHtml}
      <div class="add-ms-wrap">
        <button class="add-btn" onclick="openAddMilestone(event,'${p.id}')">＋ Add milestone</button>
      </div>
    </div>
  </div>`;
}

function simpleCard(p, badge, section) {
  return `<div class="card">
    <div class="card-header" onclick="toggleCard(this)">
      <span class="proj-num">${p.id}</span>
      <span class="proj-name">${p.name}</span>
      ${(p.staff||[]).map(s=>`<span class="staff-pill">${s}</span>`).join('')}
      ${badge ? statusBadge(badge) : ''}
      <button class="edit-btn" title="Edit" onclick="openEditSimple(event,'${p.id}','${section}')">✎</button>
      <span class="chevron">›</span>
    </div>
    <div class="card-body">
      <div class="card-comment">${p.comment||'—'}</div>
    </div>
  </div>`;
}

function renderLodgements() {
  return (DATA.lodgements||[]).filter(matches).map((p, i) => {
    const histId = 'hist-' + i;
    const histHtml = (p.history||[]).map(h => {
      const rawDate = h.date||'';
      const cleanDate = rawDate.includes('T') ? rawDate.split('T')[0] : rawDate.replace(/\s+\d{2}:\d{2}:\d{2}.*$/,'').replace(/\s+GMT.*$/,'').trim();
      return `<div class="history-item">
        <span class="history-date">${cleanDate}</span>
        <span class="history-by">${h.by}</span>
        <div class="history-note">${h.note}</div>
      </div>`;
    }).join('');
    return `<div class="card">
      <div class="card-header" onclick="toggleCard(this)">
        <span class="proj-num">${p.id}</span>
        <span class="proj-name">${p.name}</span>
        ${(p.staff||[]).map(s=>`<span class="staff-pill">${s}</span>`).join('')}
        ${statusBadge(p.status||'progress')}
        <button class="edit-btn" title="Edit lodgement" onclick="openEditLodgement(event,'${p.id}')">✎</button>
        <span class="chevron">›</span>
      </div>
      <div class="card-body">
        <div class="lodge-body">
          <div class="lodge-meta">
            ${p.authority ? `<span class="meta-pill">Authority: ${p.authority}</span>` : ''}
            ${p.refNo ? `<span class="meta-pill">Ref: ${p.refNo}</span>` : ''}
          </div>
          <div class="lodge-latest"><strong>Latest Update</strong>${p.latestUpdate||'—'}</div>
          ${histHtml ? `<button class="history-toggle" onclick="toggleHistory('${histId}',this)">Show follow-up history (${(p.history||[]).length} entries)</button>
          <div class="history-list" id="${histId}">${histHtml}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderVijayPanel() {
  const panel = document.getElementById('vijayPanel');
  const list = document.getElementById('vijayList');
  if (searchVal || staffVal || currentTab !== 'active') { panel.style.display='none'; return; }

  const items = [];
  DATA.active.forEach(p => {
    (p.milestones||[]).forEach(ms => {
      const txt = (ms.comment||'').toLowerCase();
      if (txt.includes('vs for') || txt.includes('vijay') ||
          txt.includes('no feedback') && txt.includes('vs') ||
          txt.includes('sent to vs') || txt.includes('given to vijay') ||
          txt.includes('waiting for vs') || txt.includes('vijay to') ||
          txt.includes('vs to') || txt.includes('for vs')) {
        items.push({proj: p, ms});
      }
    });
  });

  document.getElementById('vijayCount').textContent = items.length;

  if (!items.length) {
    panel.style.display = 'none';
    return;
  }

  panel.style.display = 'block';
  list.innerHTML = items.map(({proj, ms}) => `
    <div class="vijay-item">
      <div class="vijay-proj">
        <span class="vijay-proj-ref">${proj.id}</span>
        <span class="vijay-proj-name">${proj.name}</span>
      </div>
      <div class="vijay-milestone">${ms.label}</div>
      <div class="vijay-comment">${ms.comment||''}</div>
      ${ms.staff ? `<div class="vijay-staff">👤 ${ms.staff}</div>` : ''}
    </div>
  `).join('');
}

function toggleCard(header) {
  const body = header.nextElementSibling;
  const chev = header.querySelector('.chevron');
  body.classList.toggle('open');
  if (chev) chev.classList.toggle('open');
}

function toggleHistory(id, btn) {
  const el = document.getElementById(id);
  if (!el) return;
  el.classList.toggle('open');
  btn.textContent = el.classList.contains('open')
    ? 'Hide follow-up history'
    : `Show follow-up history (${el.querySelectorAll('.history-item').length} entries)`;
}

function esc(s) { return (s||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

// ── Modal ──
function openModal(title, bodyHtml, context, showDelete) {
  modalContext = context;
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalBody').innerHTML = bodyHtml;
  document.getElementById('modalDeleteBtn').style.display = showDelete ? 'inline-block' : 'none';
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('open'); modalContext = null; }
document.addEventListener('keydown', e => { if (e.key==='Escape') closeModal(); });
document.getElementById('modalOverlay').addEventListener('click', e => { if (e.target===document.getElementById('modalOverlay')) closeModal(); });

function statusOptions(current) {
  return ['progress','done','hold','stuck','closed','heldup'].map(s =>
    `<option${s===current?' selected':''}>${s}</option>`).join('');
}
function msStatusOptions(current) {
  return ['progress','done','hold','stuck'].map(s =>
    `<option${s===current?' selected':''}>${s}</option>`).join('');
}

function openEditMilestone(e, projectId, label) {
  e.stopPropagation();
  const p = DATA.active.find(x => x.id===projectId);
  const ms = p && (p.milestones||[]).find(m => m.label===label);
  if (!ms) return;
  openModal('Edit Milestone', `
    <label>Milestone Label</label><input id="m_label" value="${esc(ms.label)}">
    <label>Comment / Notes</label><textarea id="m_comment">${ms.comment||''}</textarea>
    <label>Staff</label><input id="m_staff" value="${ms.staff||''}" placeholder="e.g. Ashreet / Masi">
    <label>Status</label><select id="m_status">${msStatusOptions(ms.status)}</select>
    <label>Date (optional)</label><input id="m_date" value="${ms.date||''}" placeholder="e.g. Updated 23/03">
  `, {type:'milestone', projectId, originalLabel:label}, false);
}

function openAddMilestone(e, projectId) {
  e.stopPropagation();
  openModal('Add Milestone', `
    <label>Milestone Label</label><input id="m_label" placeholder="e.g. Building Permit">
    <label>Comment / Notes</label><textarea id="m_comment" placeholder="Details…"></textarea>
    <label>Staff</label><input id="m_staff" placeholder="e.g. Ashreet / Masi">
    <label>Status</label><select id="m_status">${msStatusOptions('progress')}</select>
    <label>Date (optional)</label><input id="m_date" placeholder="e.g. Updated 23/03">
  `, {type:'addMilestone', projectId}, false);
}

function openEditProject(e, projectId) {
  e.stopPropagation();
  const p = DATA.active.find(x => x.id===projectId);
  if (!p) return;
  openModal('Edit Project', `
    <label>Project ID</label><input id="p_id" value="${esc(p.id)}">
    <label>Project Name</label><input id="p_name" value="${esc(p.name)}">
    <label>Phase</label><input id="p_phase" value="${p.phase||''}">
    <label>Staff (comma separated)</label><input id="p_staff" value="${(p.staff||[]).join(', ')}">
    <label>Overall Status</label><select id="p_overall">${statusOptions(p.overall)}</select>
  `, {type:'project', projectId}, true);
}

function openAddProject() {
  openModal('Add New Project', `
    <label>Project ID</label><input id="p_id" placeholder="e.g. 26-01">
    <label>Project Name</label><input id="p_name" placeholder="Project name">
    <label>Phase</label><input id="p_phase" placeholder="e.g. Concept">
    <label>Staff (comma separated)</label><input id="p_staff" placeholder="e.g. Ashreet, Masi">
    <label>Overall Status</label><select id="p_overall">${statusOptions('progress')}</select>
    <label>First Milestone Label</label><input id="p_firstMilestone" placeholder="e.g. Concept Design">
  `, {type:'addProject'}, false);
}

function openEditSimple(e, id, section) {
  e.stopPropagation();
  const list = section==='standby' ? (DATA.standby||[]) : (DATA.onHold||[]);
  const p = list.find(x => x.id===id);
  if (!p) return;
  openModal((section==='standby'?'Standby':'On-Hold') + ' Project', `
    <label>Project ID</label><input id="s_id" value="${esc(p.id)}">
    <label>Project Name</label><input id="s_name" value="${esc(p.name)}">
    <label>Staff (comma separated)</label><input id="s_staff" value="${(p.staff||[]).join(', ')}">
    <label>Comment</label><textarea id="s_comment">${p.comment||''}</textarea>
  `, {type:'simple', id, section}, false);
}

function openAddOnHold() {
  openModal('Add On-Hold Project', `
    <label>Project ID</label><input id="s_id" placeholder="e.g. 25-12">
    <label>Project Name</label><input id="s_name" placeholder="Project name">
    <label>Staff (comma separated)</label><input id="s_staff" placeholder="e.g. Masi">
    <label>Comment</label><textarea id="s_comment" placeholder="Status / notes"></textarea>
  `, {type:'addSimple', section:'onHold'}, false);
}

function openEditLodgement(e, id) {
  e.stopPropagation();
  const p = (DATA.lodgements||[]).find(x => x.id===id);
  if (!p) return;
  openModal('Edit Lodgement', `
    <label>Project ID</label><input id="l_id" value="${esc(p.id)}">
    <label>Project Name</label><input id="l_name" value="${esc(p.name)}">
    <label>Staff (comma separated)</label><input id="l_staff" value="${(p.staff||[]).join(', ')}">
    <label>Authority</label><input id="l_authority" value="${p.authority||''}">
    <label>Ref No</label><input id="l_refNo" value="${p.refNo||''}">
    <label>Status</label><select id="l_status">${statusOptions(p.status)}</select>
    <label>Latest Update</label><textarea id="l_update">${p.latestUpdate||''}</textarea>
    <label>Add Follow-up Entry (optional)</label>
    <input id="l_histDate" placeholder="Date e.g. 21/04/26">
    <input id="l_histBy" placeholder="Updated by (name)" style="margin-top:4px">
    <textarea id="l_histNote" placeholder="Follow-up note" style="margin-top:4px"></textarea>
  `, {type:'lodgement', id}, false);
}

function openAddLodgement() {
  openModal('Add Lodgement', `
    <label>Project ID</label><input id="l_id" placeholder="e.g. 25-20">
    <label>Project Name</label><input id="l_name" placeholder="Project name">
    <label>Staff (comma separated)</label><input id="l_staff" placeholder="e.g. Francis, Emosi">
    <label>Authority</label><input id="l_authority" placeholder="e.g. SCC">
    <label>Ref No</label><input id="l_refNo" placeholder="e.g. SCC File 12/345">
    <label>Status</label><select id="l_status">${statusOptions('progress')}</select>
    <label>Latest Update</label><textarea id="l_update" placeholder="Current status…"></textarea>
  `, {type:'addLodgement'}, false);
}

async function handleModalSave() {
  const ctx = modalContext;
  if (!ctx) return;
  const val = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  try {
    if (ctx.type==='milestone') {
      await apiPost({action:'updateMilestone', projectId:ctx.projectId, label:ctx.originalLabel,
        comment:val('m_comment'), staff:val('m_staff'), status:val('m_status'), date:val('m_date')});
      showToast('Milestone updated ✓','success');
    } else if (ctx.type==='addMilestone') {
      await apiPost({action:'addMilestone', projectId:ctx.projectId, label:val('m_label'),
        comment:val('m_comment'), staff:val('m_staff'), status:val('m_status'), date:val('m_date')});
      showToast('Milestone added ✓','success');
    } else if (ctx.type==='project') {
      await apiPost({action:'updateProject', id:val('p_id'), name:val('p_name'), phase:val('p_phase'),
        staff:val('p_staff').split(',').map(s=>s.trim()).filter(Boolean), overall:val('p_overall')});
      showToast('Project updated ✓','success');
    } else if (ctx.type==='addProject') {
      await apiPost({action:'addProject', id:val('p_id'), name:val('p_name'), phase:val('p_phase'),
        staff:val('p_staff').split(',').map(s=>s.trim()).filter(Boolean),
        overall:val('p_overall'), firstMilestone:val('p_firstMilestone')});
      showToast('Project added ✓','success');
    } else if (ctx.type==='simple' || ctx.type==='addSimple') {
      await apiPost({action:'updateOnHold', section:ctx.section,
        id:val('s_id'), name:val('s_name'),
        staff:val('s_staff').split(',').map(s=>s.trim()).filter(Boolean),
        comment:val('s_comment')});
      showToast('Updated ✓','success');
    } else if (ctx.type==='lodgement') {
      const histNote = val('l_histNote');
      const payload = {action:'updateLodgement', id:val('l_id'), name:val('l_name'),
        staff:val('l_staff').split(',').map(s=>s.trim()).filter(Boolean),
        authority:val('l_authority'), refNo:val('l_refNo'),
        status:val('l_status'), latestUpdate:val('l_update')};
      if (histNote) { payload.histDate=val('l_histDate'); payload.histBy=val('l_histBy'); payload.histNote=histNote; }
      await apiPost(payload);
      showToast('Lodgement updated ✓','success');
    } else if (ctx.type==='addLodgement') {
      await apiPost({action:'addLodgement', id:val('l_id'), name:val('l_name'),
        staff:val('l_staff').split(',').map(s=>s.trim()).filter(Boolean),
        authority:val('l_authority'), refNo:val('l_refNo'),
        status:val('l_status'), latestUpdate:val('l_update')});
      showToast('Lodgement added ✓','success');
    }
    closeModal();
  } catch(e) {
    showToast('Save failed: ' + e.message, 'error');
  }
}

async function handleModalDelete() {
  if (!modalContext || !confirm('Delete this item? This cannot be undone.')) return;
  const ctx = modalContext;
  try {
    if (ctx.type==='project') {
      await apiPost({action:'deleteProject', id:ctx.projectId});
      showToast('Project deleted','success');
      closeModal();
    } else {
      showToast('To delete on-hold or lodgement items, remove the row directly in Google Sheets.', 'error');
    }
  } catch(e) {
    showToast('Delete failed: ' + e.message, 'error');
  }
}

window.toggleHistory = toggleHistory;
window.toggleCard = toggleCard;
window.handleModalSave = handleModalSave;
window.handleModalDelete = handleModalDelete;
window.closeModal = closeModal;
</script>
</body>
</html>
